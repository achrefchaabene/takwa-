<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menu officiel Delicious by Takwa: jus fruits secs et jus frais à Ksour Essef, Mahdia.">
    <title>Delicious by Takwa - Menu officiel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #052f20;
            --deep-green: #011e15;
            --cream: #fff7e9;
            --gold: #c79435;
            --gold-soft: #f0ca73;
            --ink: #143024;
            --shadow: 0 24px 70px rgba(1, 19, 13, 0.35);
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--cream);
            background:
                radial-gradient(circle at 15% 8%, rgba(240, 202, 115, 0.2), transparent 24%),
                radial-gradient(circle at 85% 15%, rgba(255, 247, 233, 0.14), transparent 26%),
                linear-gradient(145deg, var(--deep-green), var(--green) 48%, #02150f);
            padding: clamp(14px, 3vw, 34px);
        }

        .page {
            width: min(1040px, 100%);
            margin: 0 auto;
        }

        .poster-shell {
            position: relative;
            padding: clamp(8px, 1.5vw, 14px);
            border: 1px solid rgba(240, 202, 115, 0.65);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 247, 233, 0.22), rgba(199, 148, 53, 0.08)),
                rgba(1, 30, 21, 0.86);
            box-shadow: var(--shadow);
        }

        .poster {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 4px;
            background: #f8efe0;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 18px auto 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 11px 16px;
            border: 1px solid rgba(240, 202, 115, 0.78);
            border-radius: 8px;
            color: var(--cream);
            background: rgba(1, 30, 21, 0.76);
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
            color: var(--ink);
            background: var(--gold-soft);
            outline: none;
        }

        .btn-primary {
            color: var(--ink);
            background: linear-gradient(180deg, #ffe7a3, var(--gold));
        }

        .info {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .info-item {
            min-height: 62px;
            padding: 12px;
            border: 1px solid rgba(240, 202, 115, 0.45);
            border-radius: 8px;
            background: rgba(255, 247, 233, 0.08);
            text-align: center;
            font-weight: 800;
        }

        .info-item small {
            display: block;
            margin-bottom: 5px;
            color: var(--gold-soft);
            font-size: 12px;
            text-transform: uppercase;
        }

        .footer {
            padding: 18px 0 4px;
            color: rgba(255, 247, 233, 0.82);
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 720px) {
            body {
                padding: 10px;
            }

            .actions,
            .info {
                grid-template-columns: 1fr;
            }

            .btn {
                flex: 1 1 calc(50% - 10px);
                padding-inline: 10px;
                font-size: 13px;
            }

            .info {
                display: grid;
            }
        }

        @media (max-width: 430px) {
            .btn {
                flex-basis: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page" aria-label="Menu Delicious by Takwa">
        <section class="poster-shell" aria-label="Affiche du menu">
            <img class="poster" src="assets/menu-takwa.png" alt="Menu Delicious by Takwa avec jus fruits secs: pistache, noisette, zgougou, caramel, et jus frais: citron, citron rozataa, citron menthe, fraise, fraise menthe, cocktail fruits de saison.">
        </section>

        <nav class="actions" aria-label="Liens de contact">
            <a class="btn btn-primary" href="https://wa.me/21650883282" target="_blank" rel="noopener noreferrer">WhatsApp</a>
            <a class="btn" href="https://www.instagram.com/delicious_by_takwa?igsh=NW03b3I1a2Rhd3Vo" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a class="btn" href="https://www.facebook.com/share/1CzZLF6UMU/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
            <a class="btn" href="https://www.tiktok.com/@takwabanes?_r=1&_t=ZS-97LuveANegU" target="_blank" rel="noopener noreferrer">TikTok</a>
            <a class="btn" href="https://www.google.com/maps/search/?api=1&query=35.409000,11.006306" target="_blank" rel="noopener noreferrer">Localisation</a>
        </nav>

        <section class="info" aria-label="Informations">
            <div class="info-item"><small>Téléphone</small>50883282</div>
            <div class="info-item"><small>Instagram</small>DELICIOUS_BY_TAKWA</div>
            <div class="info-item"><small>Adresse</small>Ksour Essef, Mahdia</div>
        </section>

        <footer class="footer">© 2026 Delicious by Takwa. Tous droits réservés.</footer>
    </main>
</body>
</html>
