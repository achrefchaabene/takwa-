<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious by Takwa - Officiel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #0d1a14;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #11241b, #173024);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(212, 175, 55, 0.08);
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
            background-color: #0d1a14;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f3e5ab;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 13px;
            color: #a4bdaf;
            margin-bottom: 35px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }

        .btn-fb {
            background-color: #1877f2;
        }

        .btn-tiktok {
            background-color: #000000;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-tiktok:hover {
            border-color: #d4af37;
        }

        .btn-maps {
            background-color: #ea4335;
            box-shadow: 0 4px 15px rgba(234, 67, 53, 0.2);
        }

        .btn-wa {
            background-color: #25d366;
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: #557564;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="assets/logo-delicious-by-takwa.png" alt="Delicious by Takwa Logo">
        </div>

        <h1>Delicious by Takwa</h1>
        <div class="tagline">Saveurs &amp; Douceurs</div>

        <div class="links-wrapper">
            <a href="https://www.instagram.com/takwa_b.anes?igsh=Nm14ZDh5MzVxMmQ=" class="btn btn-insta" target="_blank" rel="noopener noreferrer">Instagram Officiel</a>
            <a href="https://www.facebook.com/share/17r1SjFbfD/?mibextid=wwXIfr" class="btn btn-fb" target="_blank" rel="noopener noreferrer">Page Facebook</a>
            <a href="https://www.tiktok.com/@takwabanes?_r=1&amp;_t=ZS-97LuveANegU" class="btn btn-tiktok" target="_blank" rel="noopener noreferrer">TikTok Vid&eacute;os</a>
            <a href="https://www.google.com/maps/search/?api=1&amp;query=35.409000,11.006306" class="btn btn-maps" target="_blank" rel="noopener noreferrer">&#128205; Notre Localisation</a>
            <a href="https://wa.me/21650883282" class="btn btn-wa" target="_blank" rel="noopener noreferrer">Commander via WhatsApp</a>
        </div>

        <div class="footer">
            &copy; 2026 Delicious by Takwa. Tous droits r&eacute;serv&eacute;s.
        </div>
    </div>
</body>
</html>
