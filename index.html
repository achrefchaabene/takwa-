<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious by Takwa - Menu officiel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #1e1712;
            --cream: #fff8ee;
            --paper: #f5e6d1;
            --gold: #b98a4b;
            --sage: #466b5b;
            --rose: #be5b55;
            --shadow: 0 22px 55px rgba(42, 31, 23, 0.22);
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.8), transparent 28%),
                linear-gradient(135deg, #ead4b9 0%, #f8efe1 44%, #d2b18d 100%);
            padding: 24px;
        }

        .page {
            width: min(1120px, 100%);
            margin: 0 auto;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 24px;
            align-items: center;
            padding: 22px 0 26px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .logo {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(185, 138, 75, 0.7);
            box-shadow: 0 10px 28px rgba(42, 31, 23, 0.2);
            background: var(--cream);
            flex: 0 0 auto;
        }

        h1 {
            font-size: clamp(34px, 8vw, 74px);
            line-height: 0.9;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .subtitle {
            margin-top: 9px;
            color: #73583b;
            font-size: clamp(15px, 2.4vw, 19px);
            font-weight: 700;
            text-transform: uppercase;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 11px 15px;
            border-radius: 8px;
            border: 1px solid rgba(30, 23, 18, 0.12);
            color: var(--ink);
            background: rgba(255, 248, 238, 0.74);
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(42, 31, 23, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(42, 31, 23, 0.15);
        }

        .btn-primary {
            color: #ffffff;
            background: var(--sage);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            max-width: 600px;
            margin: 0 auto;
            gap: 18px;
        }

        .menu-card {
            overflow: hidden;
            border: 1px solid rgba(30, 23, 18, 0.12);
            border-radius: 8px;
            background: rgba(255, 248, 238, 0.72);
            box-shadow: var(--shadow);
        }

        .menu-card a {
            display: block;
            color: inherit;
            text-decoration: none;
        }

        .menu-card img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
            background: var(--paper);
        }

        .menu-caption {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .menu-caption span {
            color: var(--rose);
            font-size: 13px;
        }

        .info {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin: 18px 0 0;
        }

        .info-item {
            min-height: 64px;
            padding: 14px;
            border-radius: 8px;
            background: rgba(255, 248, 238, 0.74);
            border: 1px solid rgba(30, 23, 18, 0.1);
            font-weight: 800;
            text-align: center;
        }

        .info-item small {
            display: block;
            margin-bottom: 5px;
            color: #73583b;
            font-size: 12px;
            text-transform: uppercase;
        }

        .footer {
            padding: 24px 0 6px;
            color: #73583b;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 780px) {
            body {
                padding: 16px;
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .contact {
                justify-content: flex-start;
            }

            .info {
                grid-template-columns: 1fr;
            }

            .btn {
                flex: 1 1 calc(50% - 10px);
            }
        }

        @media (max-width: 460px) {
            .brand {
                align-items: flex-start;
            }

            .logo {
                width: 62px;
                height: 62px;
            }

            .btn {
                flex-basis: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero" aria-label="Delicious by Takwa">
            <div class="brand">
                <img class="logo" src="assets/logo-delicious-by-takwa.png" alt="Logo Delicious by Takwa">
                <div>
                    <h1>Delicious<br>by Takwa</h1>
                    <p class="subtitle">Jus frais et fruits secs</p>
                </div>
            </div>

            <nav class="contact" aria-label="Liens de contact">
                <a class="btn btn-primary" href="https://wa.me/21650883282" target="_blank" rel="noopener noreferrer">WhatsApp</a>
                <a class="btn" href="https://www.instagram.com/delicious_by_takwa?igsh=NW03b3I1a2Rhd3Vo" target="_blank" rel="noopener noreferrer">Instagram</a>
                <a class="btn" href="https://www.facebook.com/share/1CzZLF6UMU/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
                <a class="btn" href="https://www.tiktok.com/@takwabanes?_r=1&_t=ZS-97LuveANegU" target="_blank" rel="noopener noreferrer">TikTok</a>
                <a class="btn" href="https://www.google.com/maps/search/?api=1&query=35.409000,11.006306" target="_blank" rel="noopener noreferrer">Localisation</a>
            </nav>
        </section>

        <section class="menu-grid" aria-label="Menus Delicious by Takwa">
            <article class="menu-card">
                <a href="assets/menu-jus.jpeg" target="_blank" rel="noopener noreferrer">
                    <img src="assets/menu-jus.jpeg" alt="Menu Jus - Delicious by Takwa">
                    <div class="menu-caption">Menu Jus <span>Voir</span></div>
                </a>
            </article>
        </section>

        <section class="info" aria-label="Informations">
            <div class="info-item"><small>Téléphone</small>50883282</div>
            <div class="info-item"><small>Instagram</small>DELICIOUS_BY_TAKWA</div>
            <div class="info-item"><small>Adresse</small>Ksour Essef, Mahdia</div>
        </section>

        <footer class="footer">© 2026 Delicious by Takwa. Tous droits réservés.</footer>
    </main>
</body>
</html>
